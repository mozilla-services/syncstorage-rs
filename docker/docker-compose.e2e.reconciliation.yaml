# docker-compose overlay for the payload-link reconciliation e2e stack.
#
# Layers on top of docker-compose.spanner.yaml + docker-compose.e2e.spanner.yaml.
# Adds Pub/Sub emulator, fake-gcs-server, one-shot setup container, the
# Python payload-link publisher, and a long-running reconciler pod;
# turns on GCS payload offload in syncserver so test_storage.py
# exercises the offload path.
#
# Invocation is documented in the Makefile target
# `docker_run_reconciliation_e2e_tests` and in
# docs/src/tools/payload_link_reconciler.md.

services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    entrypoint:
      - /bin/sh
      - -c
      - >-
        gcloud beta emulators pubsub start
        --host-port=0.0.0.0:8085
        --project=test-project
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/ || exit 1"]
      interval: 2s
      retries: 15
      start_period: 10s
      timeout: 3s

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command:
      - -scheme=http
      - -host=0.0.0.0
      - -port=4443
      - -public-host=fake-gcs:4443
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      retries: 15
      start_period: 5s
      timeout: 3s

  reconciliation-setup:
    image: docker.io/library/alpine:3.20
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./reconciliation-setup.sh:/setup.sh:ro
    # The script itself just performs REST calls and exits (so it can
    # be run standalone). The entrypoint wraps it: on success, touches
    # a marker file that the healthcheck watches, then blocks so
    # `docker compose --abort-on-container-exit` doesn't tear the
    # stack down when the setup finishes. Same idea as the
    # `sleep infinity` trailer on sync-db-setup in
    # docker-compose.spanner.yaml, but kept out of the script.
    entrypoint:
      - /bin/sh
      - -c
      - "apk add --no-cache curl >/dev/null && /setup.sh && touch /tmp/setup-done && exec tail -f /dev/null"
    environment:
      PROJECT_ID: test-project
      PUBSUB_HOST: http://pubsub-emulator:8085
      GCS_HOST: http://fake-gcs:4443
      PUBSUB_TOPIC: payload-link-changes
      PUBSUB_SUBSCRIPTION: payload-link-reconciler-sub
      GCS_PAYLOAD_BUCKET: test-payloads
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/setup-done"]
      interval: 2s
      retries: 15
      start_period: 3s
      timeout: 3s

  payload-link-publisher:
    build:
      context: ../tools/payload-link-dataflow/payload-link-publisher-py
    depends_on:
      sync-db-setup:
        condition: service_started
      reconciliation-setup:
        condition: service_healthy
    environment:
      SPANNER_PROJECT_ID: test-project
      SPANNER_INSTANCE_ID: test-instance
      SPANNER_DATABASE_ID: test-database
      SPANNER_EMULATOR_HOST: sync-db:9010
      PUBSUB_PROJECT_ID: test-project
      PUBSUB_TOPIC: payload-link-changes
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      SPANNER_CHANGE_STREAM_NAME: payload_link_changes
      HEARTBEAT_MS: "1000"
      POLL_OVERLAP_SECONDS: "5"

  payload-reconciler:
    image: ${SYNCSTORAGE_RS_IMAGE:-syncstorage-rs:latest}
    depends_on:
      reconciliation-setup:
        condition: service_healthy
    entrypoint:
      - python3
      - /app/tools/payload-reconciler/reconcile_payload_links.py
    environment:
      PUBSUB_PROJECT_ID: test-project
      PUBSUB_SUBSCRIPTION: payload-link-reconciler-sub
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCS_PAYLOAD_BUCKET: test-payloads
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      # Long-running mode -- do NOT set RUN_BUDGET_SECONDS.

  syncserver:
    depends_on:
      sync-db-setup:
        condition: service_started
      tokenserver-db:
        condition: service_healthy
      reconciliation-setup:
        condition: service_healthy
    environment:
      SYNC_SYNCSTORAGE__GCS_PAYLOAD_BUCKET: test-payloads
      SYNC_SYNCSTORAGE__GCS_ENDPOINT: http://fake-gcs:4443
      # Collections used by test_storage.py -- opts them all into offload
      # so test_storage.py exercises the offload path as regression
      # coverage. Extend if new collections appear in the test suite.
      SYNC_SYNCSTORAGE__GCS_PAYLOAD_OFFLOAD_COLLECTIONS: >-
        apis-1,crypto,meta,passwords,xxx_col,xxx_col1,xxx_col2,xxx_meh,xxxx,nonexistent

  e2e-tests:
    depends_on:
      mock-fxa-server:
        condition: service_started
      syncserver:
        condition: service_healthy
      tokenserver-db:
        condition: service_healthy
      payload-link-publisher:
        condition: service_started
      payload-reconciler:
        condition: service_started
    environment:
      # Un-skips tools/integration_tests/test_payload_link_reconciliation.py
      # (module-level skipif keys on GCS_PAYLOAD_BUCKET).
      GCS_PAYLOAD_BUCKET: test-payloads
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      RESULTS_FILENAME: ${RESULTS_FILENAME:-reconciliation_integration_results.xml}
