name: Checks

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - "**"

# This ensures any in-progress workflows in the same branch or PR
# are cancelled if there is a fresh push.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {} # workflow-level default — deny all

jobs:
  python-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python
        with:
          workspace-path: workflow

      - name: Python Format Check
        run: make ruff-fmt-chk

      - name: Python Lint Check
        run: make ruff-lint

  rust-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          workspace-path: workflow

      - name: Rust Format Check
        run: cargo fmt -- --check

      - name: Cargo Audit
        run: cargo audit

      - name: Rust Clippy Spanner
        run: make clippy_spanner

      - name: Rust Clippy MySQL
        run: make clippy_mysql

      - name: Rust Clippy Postgres
        run: make clippy_postgres

      - name: Setup documentation checks
        run: make doc-install-deps

      - name: Documentation checks
        run: make doc-test
