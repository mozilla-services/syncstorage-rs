name: Checks

on:
  push:
    branches:
      - master
      - main
    tags:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        default: "3.12" # PY_VER
      rust-version:
        description: "Rust version to use"
        required: false
        default: "1.91" # RUST_VER

env:
  PYTHON_VERSION: ${{ inputs.python-version || '3.12' }} # PY_VER
  RUST_VERSION: ${{ inputs.rust-version || '1.91' }} # RUST_VER

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {} # workflow-level default — deny all

jobs:
  # Setup jobs and populate cache

  python-env:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip and Poetry virtualenv
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-python-${{ hashFiles('pyproject.toml', 'poetry.lock') }}

      - name: Install Poetry
        run: pip3 install poetry

      - name: Install Python dependencies
        run: poetry install --with tokenserver-unit-tests,dev --no-interaction --no-ansi

      - name: Display Python Version Info
        shell: bash
        run: |
          if [ "$(which python)" != "" ]; then python --version; fi
          uname -a
          cat /etc/os-release

  rust-env:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rust-toolchain-${{ env.RUST_VERSION }}

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ env.RUST_VERSION }} --component rustfmt --component clippy --no-self-update && rustup default ${{ env.RUST_VERSION }}

      - name: Display Rust Version Info
        shell: bash
        run: |
          if [ "$(which rustc)" != "" ]; then rustc --version; fi
          uname -a
          cat /etc/os-release

  python-checks:
    needs: python-env
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore pip and Poetry virtualenv
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-python-${{ hashFiles('pyproject.toml', 'poetry.lock') }}

      - name: Install Poetry
        run: pip3 install poetry

      - name: Python Format Check
        run: poetry run ruff format --diff tools

      - name: Python Lint Check
        run: poetry run ruff check tools

  rust-checks:
    needs: rust-env
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Rust toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rust-toolchain-${{ env.RUST_VERSION }}

      - name: Set Rust toolchain
        run: rustup default ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Setup documentation checks
        run: make doc-install-deps

      - name: Rust Format Check
        run: cargo fmt -- --check

      - name: Cargo Audit
        run: cargo audit

      - name: Documentation checks
        run: make doc-test

  clippy:
    needs: rust-env
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target: [spanner, mysql, postgres]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Rust toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rust-toolchain-${{ env.RUST_VERSION }}

      - name: Set Rust toolchain
        run: rustup default ${{ env.RUST_VERSION }}

      - name: Rust Clippy ${{ matrix.target }}
        run: make clippy_${{ matrix.target }}
