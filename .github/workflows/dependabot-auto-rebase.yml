name: Auto-rebase Dependabot PRs

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions: {} # workflow-level default — deny all

concurrency:
  group: dependabot-auto-rebase
  cancel-in-progress: true

jobs:
  rebase-open-dependabot-prs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment "@dependabot rebase" on open Dependabot PRs targeting master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBERS=$(gh pr list \
            --repo "$REPO" \
            --base master \
            --author "app/dependabot" \
            --state open \
            --limit 100 \
            --json number \
            --jq '.[].number') || true

          if [ -z "$PR_NUMBERS" ]; then
            echo "No open Dependabot PRs targeting master"
            exit 0
          fi

          echo "$PR_NUMBERS" | while IFS= read -r pr; do
            echo "Requesting rebase on PR #$pr"
            gh pr comment "$pr" --repo "$REPO" --body "@dependabot rebase" || true
          done
