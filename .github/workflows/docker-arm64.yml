name: Build ARM64 Docker Image

on:
  workflow_dispatch: 
  push:
    tags:
      - '*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Set Image Tags
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME=${{ github.event.release.tag_name }}
            echo "tags=cwndev/syncserver-rs:$TAG_NAME,cwndev/syncserver-rs:latest" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::7}
            echo "tags=cwndev/syncserver-rs:dev-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi
    
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            SYNCSTORAGE_DATABASE_BACKEND=postgres
            TOKENSERVER_DATABASE_BACKEND=postgres
          tags: ${{ steps.vars.outputs.tags }}
