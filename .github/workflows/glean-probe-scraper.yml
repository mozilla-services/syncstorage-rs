---
name: Glean probe-scraper
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {} # workflow-level default — deny all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  glean-probe-scraper:
    permissions:
      contents: read
      checks: write
    uses: mozilla/probe-scraper/.github/workflows/glean.yaml@03e58b1f634585f79c89321b835952a179a05a93 # v1.0
