---
name: Glean probe-scraper
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {} # workflow-level default — deny all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  glean-probe-scraper:
    permissions:
      contents: read
      checks: write
    uses: mozilla/probe-scraper/.github/workflows/glean.yaml@cbf683349db3ecac04604f40fb62de8e5bd1fa64 # v1.0
