---
name: Glean probe-scraper
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {} # workflow-level default — deny all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  glean-probe-scraper:
    permissions:
      contents: read
      checks: write
    uses: mozilla/probe-scraper/.github/workflows/glean.yaml@fec17297f9132cb71b70f9390fa89384d9ad246e # v1.0
