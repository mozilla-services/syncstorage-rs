---
name: Glean probe-scraper
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {} # workflow-level default — deny all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  glean-probe-scraper:
    permissions:
      contents: read
      checks: write
    uses: mozilla/probe-scraper/.github/workflows/glean.yaml@2214f8a993af6bd87b7e79da4ad4452a3ba263da # v1.0
